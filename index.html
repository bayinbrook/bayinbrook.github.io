<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOMA Token 留言板</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }
        body {
            max-width: 800px;
            margin: 30px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .box {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        h2 {
            margin-bottom: 15px;
            color: #333;
        }
        input, textarea {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }
        button {
            background: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background: #0056b3;
        }
        .message {
            padding: 12px;
            border-bottom: 1px solid #eee;
        }
        .message h4 {
            color: #007bff;
            margin-bottom: 5px;
        }
        .message p {
            color: #333;
        }
        .message .time {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <div class="box">
        <h2>📝 MOMA Token 留言板</h2>
        <input type="text" id="name" placeholder="请输入你的昵称">
        <textarea id="content" rows="4" placeholder="请输入留言内容"></textarea>
        <button onclick="sendMsg()">提交留言</button>
    </div>

    <div class="box">
        <h2>💬 最新留言</h2>
        <div id="msgList"></div>
    </div>

    <script>
        // 页面加载时读取留言
        window.onload = getMessages;

        // 读取本地留言（存在浏览器本地，不会丢失）
        function getMessages() {
            let msgs = JSON.parse(localStorage.getItem("momaMessages") || "[]");
            let html = "";
            
            // 倒序显示（最新的在最上面）
            msgs.reverse().forEach(item => {
                html += `
                <div class="message">
                    <h4>${item.name}</h4>
                    <p>${item.content}</p>
                    <div class="time">${item.time}</div>
                </div>
                `;
            });

            document.getElementById("msgList").innerHTML = html || "暂无留言，快来抢沙发！";
        }

        // 提交留言
        function sendMsg() {
            let name = document.getElementById("name").value.trim();
            let content = document.getElementById("content").value.trim();

            if (!name || !content) {
                alert("昵称和留言内容都不能为空！");
                return;
            }

            // 构造留言数据
            let msg = {
                name: name,
                content: content,
                time: new Date().toLocaleString()
            };

            // 读取历史 + 新增
            let msgs = JSON.parse(localStorage.getItem("momaMessages") || "[]");
            msgs.push(msg);
            localStorage.setItem("momaMessages", JSON.stringify(msgs));

            alert("留言成功！");
            document.getElementById("content").value = "";
            getMessages();
        }
    </script>
</body>
</html>
